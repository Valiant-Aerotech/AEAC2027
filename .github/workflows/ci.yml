name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONPATH: src

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cv]"
      - name: Ruff (syntax and undefined names)
        run: python -m ruff check src tests

  mavlink:
    name: Mavlink and safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cv]"
      - name: Import smoke
        run: |
          python -c "from valiant.common.mavlink import connection_error_hints; from valiant.autonomy.flight.profile import mavlink_connection_for_gcs"
      - name: pytest
        run: |
          python -m pytest \
            tests/test_mavlink_connect.py \
            tests/test_mavlink_statustext.py \
            tests/test_mavlink_land.py \
            tests/test_profile_connection.py \
            tests/test_fc_safety.py \
            tests/test_sitl_preflight.py \
            -q --tb=short

  motion:
    name: Motion and nav
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cv]"
      - name: Import smoke
        run: |
          python -c "from valiant.autonomy.auto_nav.planner import MotionPlanner; from valiant.common.sitl_physics import refresh_vehicle_pose"
      - name: pytest
        run: |
          python -m pytest \
            tests/test_motion_planner.py \
            tests/test_ned_kinematics.py \
            tests/test_visual_servo_guided.py \
            tests/test_pilot_override.py \
            tests/test_gcs_hud.py \
            tests/test_sitl_motion.py \
            tests/test_sitl_search.py \
            tests/test_sitl_pattern.py \
            tests/test_sitl_physics_pose.py \
            -q --tb=short

  cv-metric:
    name: CV and metric
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cv]"
      - name: Import smoke
        run: |
          python -c "from valiant.autonomy.cv import create_target_detector, draw_mission_overlay; from valiant.autonomy.metric_recon import create_metric_reconstructor; from valiant.autonomy.auto_nav import create_motion_planner; from valiant.autonomy.spray import is_aimed"
      - name: pytest
        run: |
          python -m pytest \
            tests/test_yolo_onnx.py \
            tests/test_metric_geometry_3d.py \
            tests/test_synthetic_camera.py \
            tests/test_sitl_physics.py \
            -q --tb=short

  config:
    name: Config and platform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cv]"
      - name: Verify environment
        run: python tools/bench/verify_env.py
      - name: Import smoke
        run: |
          python -c "from valiant.autonomy.orchestrator import AutoExtinguisher; from valiant.common.config import load_config; load_config('rpas')"
      - name: pytest
        run: |
          python -m pytest \
            tests/test_rpas_config.py \
            tests/test_flight_profiles.py \
            tests/test_tools_layout.py \
            tests/test_upload_drive.py \
            tests/test_sitl_mission_loader.py \
            tests/test_config_smoke.py \
            -q --tb=short
