name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cv]"

      - name: Run pytest (exclude SITL integration)
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests/ -m "not sitl" -q --tb=short
