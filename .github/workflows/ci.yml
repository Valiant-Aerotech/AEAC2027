name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: src

jobs:
  mavlink:
    name: Mavlink and safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cv]"
      - name: pytest
        run: |
          python -m pytest \
            tests/test_mavlink_connect.py \
            tests/test_mavlink_statustext.py \
            tests/test_mavlink_land.py \
            tests/test_profile_connection.py \
            tests/test_fc_safety.py \
            tests/test_sitl_preflight.py \
            -q --tb=short

  motion:
    name: Motion and nav
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
