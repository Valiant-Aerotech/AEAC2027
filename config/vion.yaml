# Vion - fire suppression drone
# Onboard Pi path: camera.source=rpi_local (see flight_profiles.vivi for Vivi bench)

drone: vion

mavlink:
  connection: "COM5"                    # GCS scrcpy path only
  rpi_connection: "/dev/ttyAMA0"        # Pi UART to FC TELEM port
  baud: 57600
  sitl_fallback: "udpin:127.0.0.1:14550"

gcs_monitor:
  port: 14560
  ip: null                              # set via --gcs-ip on Pi

camera:
  source: scrcpy                        # scrcpy | rpi_local
  scrcpy_window_title: ExtinguisherCam
  phone_ip: null
  max_fps: 30
  max_size: 1280
  video_bit_rate_mbps: 8
  no_audio: true
  min_grab_interval_s: 0.0
  hfov_deg: 66.0
  vfov_deg: 52.0
  rpi:
    width: 640
    height: 480
    tof:
      enabled: true
      amplitude_min: 30

cv:
  method: hsv                           # hsv | yolo | both
  models:
    dry: models/dry.onnx
    shot: models/shot.onnx
  hsv_dry:  { h_min: 130, h_max: 170, s_min: 50, v_min: 50 }
  hsv_shot: { h_min: 100, h_max: 130, s_min: 50, v_min: 50 }
  hsv_min_area_px: 500
  confidence_threshold: 0.35
  max_frames_without_target: 45

metric_recon:
  mode: rangefinder                     # rangefinder | depth_at_target
  rangefinder: fov_estimate             # vl53l1x | fov_estimate | none
  target_diameter_min_m: 0.05           # CONOPS 5 cm
  target_diameter_max_m: 0.30           # CONOPS 30 cm
  target_diameter_m: 0.30               # legacy single-value fallback
  min_approach_distance_m: 2.0
  fire_distance_m: 0.8
  wall_offset_m: 0.0
  camera_down: true
  rangefinder_stale_s: 1.0

flight_profiles:
  vivi:
    camera:
      source: rpi_local
    metric_recon:
      mode: depth_at_target
      rangefinder: fov_estimate
      camera_down: false                # adjust to your Vivi camera mount
    mavlink:
      rpi_connection: "/dev/ttyAMA0"

auto_nav:
  kp_x: 0.0015
  kp_y: 0.0015
  kd_x: 0.0004                          # light damping to reduce oscillation
  kd_y: 0.0004
  max_vel: 0.4
  deadband_px: 50
  approach_speed: 0.25
  side_clearance_m: 1.0
  target_lock_area_px: 15000
  approach_timeout_s: 30
  lock_duration_s: 1.5
  lock_timeout_s: 10

spray:
  method: MAVLINK_SERVO
  channel: 15                           # AUX 7 / SERVO15
  pwm_open: 1900
  pwm_close: 1100
  duration_s: 2.0

safety:
  min_battery_pct: 20
  geofence_abort: true
  mission_timeout_s: 600                # 0 disables global timeout
  rtl_on_abort: false                   # set true to command RTL on battery/geofence abort
