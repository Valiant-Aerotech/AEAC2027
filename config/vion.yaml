# Vion - fire suppression drone
# Onboard Pi path: camera.source=rpi_local (see flight_profiles.vivi for Vivi bench)

drone: vion

mavlink:
  connection: "COM5"                    # GCS scrcpy path only
  rpi_connection: "/dev/ttyAMA0"        # Pi UART to FC TELEM port
  sitl_connection: "tcp:127.0.0.1:5760"
  baud: 57600
  sitl_fallback: "udpin:127.0.0.1:14550"

sitl:
  takeoff_alt_m: 5.0                    # NAV_TAKEOFF - start high, descend near wall
  cruise_alt_m: 5.0                     # hold until within descent_wall_range_m
  descent_wall_range_m: 4.5            # begin aligning to target altitude inside this range
  velocity_local_ned: false             # BODY_NED - ArduCopter GUIDED default for offboard vel
  preflight_timeout_s: 75               # arm + takeoff (cold EKF can take ~30s)
  ekf_wait_s: 45                        # wait for EKF3/GPS before first arm
  backoff_m: 1.5                        # reverse when wall_range below this (m)
  max_north_m: 6.0                      # geofence north of home (m)
  max_east_m: 2.0                       # geofence |east| from home (m)
  search_yaw_rate: 0.35                 # rad/s peak yaw scan during SEARCHING
  max_backup_speed: 0.12                 # cap reverse speed (m/s)
  approach_lane_y: 0.0                  # east lane centre for approach (m)
  home: tests/fixtures/sitl_home.json   # 47°34'33.9"N 52°44'03.5"W
  map:
    manifest: tests/fixtures/sitl_map/manifest.json
    view_radius_m: 24.0                 # top-down window half-width (metres)
    radius_m: 2000                      # satellite mosaic download radius
  search_speed: 0.14                    # SEARCHING reposition (m/s)
  wall_standoff_m: 1.0                   # stop / back up before wall plane (m)
  creep_speed: 0.10                     # slow advance toward target when far
  home_south_limit_m: -1.0               # never linger south of home
  approach_slow_zone_m: 2.5              # taper approach speed inside this range (m)
  min_ground_clearance_m: 1.0            # absolute floor AGL (targets can be below 2 m)
  altitude_kp: 0.22                      # NED vz gain to level with target height
  max_vz: 0.14                           # cap vertical speed (m/s) - safe descent
  alt_offset_m: -0.15                    # slight bias downward so AIMING settles closer to target center
  alt_align_tolerance_m: 0.25              # SITL fire gate on metric altitude alignment
  retreat_alt_m: 5.0                     # climb after each kill before next search
  retreat_home_north_m: 3.0              # staging south of wall between targets
  complete_hold_s: 5.0                   # keep streaming zero velocity briefly before mission exit

gcs_monitor:
  port: 14560
  ip: null                              # set via --gcs-ip on Pi
  statustext_interval_s: 3.0            # periodic T2: lines in Mission Planner Messages
  motion_events: false                  # omit low-level MOV lines from MP Messages
  statustext_severity: notice           # info|notice|warning - MP Messages visibility
  mp_use_autopilot_sysid: true          # SITL: also send as FC sysid so MP Messages shows T2:
  debug_statustext: false               # log each STATUSTEXT to terminal
  # sitl_mp_mirror: udpout:127.0.0.1:14555  # optional duplicate if MP still misses T2:

camera:
  source: scrcpy                        # scrcpy | rpi_local
  scrcpy_window_title: ExtinguisherCam
  phone_ip: null
  max_fps: 30
  max_size: 1280
  video_bit_rate_mbps: 8
  no_audio: true
  min_grab_interval_s: 0.0
  hfov_deg: 66.0
  vfov_deg: 52.0
  rpi:
    width: 640
    height: 480
    tof:
      enabled: true
      amplitude_min: 30

cv:
  method: yolo                          # yolo (trained dry) + HSV shot; or hsv | both
  models:
    dry: models/dry.onnx               # or models/dry.pt / models/best.pt
    shot: models/shot.onnx
  hsv_dry:  { h_min: 130, h_max: 170, s_min: 50, v_min: 50 }
  hsv_shot: { h_min: 100, h_max: 130, s_min: 50, v_min: 50 }
  hsv_min_area_px: 500
  confidence_threshold: 0.35
  max_frames_without_target: 45

metric_recon:
  mode: rangefinder                     # rangefinder | depth_at_target
  rangefinder: fov_estimate             # vl53l1x | fov_estimate | none
  target_diameter_min_m: 0.05           # CONOPS 5 cm
  target_diameter_max_m: 0.30           # CONOPS 30 cm
  target_diameter_m: 0.30               # legacy single-value fallback
  min_approach_distance_m: 2.0
  fire_distance_m: 0.8
  alt_align_tolerance_m: 0.25           # fire/aim gate on altitude_error_m
  altitude_kp: 0.22                     # onboard vz from altitude_error_m
  alt_offset_m: -0.15
  wall_offset_m: 0.0
  camera_down: true
  rangefinder_stale_s: 1.0

flight_profiles:
  vivi:
    camera:
      source: rpi_local
    metric_recon:
      mode: depth_at_target
      rangefinder: fov_estimate
      camera_down: false
    mavlink:
      rpi_connection: "/dev/ttyAMA0"
    gimbal:
      enabled: true
      channel: 9                         # CHANGE: your Kakute AUX servo output
      pwm_min: 1000                      # stowed / 0 deg - tune on bench
      pwm_max: 2000                      # 90 deg pitch - tune on bench
      pwm_neutral: 1500
      axis: pitch
      kp: 0.8
      deadband_px: 40
      min_interval_s: 0.1
    spray:
      method: none
    safety:
      geofence_abort: false
      check_battery: false

  vivi_orbit:
    camera:
      source: rpi_local
    mavlink:
      rpi_connection: "/dev/ttyAMA0"
    flight:
      mode: GUIDED
      require_gps: true
    field_orbit:
      trigger_alt_m: 10.0
      alt_tolerance_m: 0.35
      forward_m: 2.0
      radius_m: 5.0
      laps: 5
      direction: clockwise
      orbit_speed_m_s: 0.40
      radial_kp: 0.25
      orbit_entry_radial_kp: 0.65
      orbit_entry_blend_s: 4.0
      altitude_kp: 0.22
      max_vz: 0.15
      geofence_radius_m: 12.0
      max_duration_s: 600
      return_on_timeout: false
      loiter_settle_s: 2.0
      standby_retrigger: true
      pilot:
        guided_mode_channel: null
        kill_switch_rc_channel: 8
        kill_switch_pwm_high: 1300
        companion_land_on_kill: false
    gcs_monitor:
      statustext_interval_s: 2.0
    safety:
      geofence_abort: true
      check_battery: true

  sitl_orbit:
    camera:
      source: synthetic
    mavlink:
      connection: "tcp:127.0.0.1:5760"
    spray:
      method: none
    safety:
      geofence_abort: true
      check_battery: false
    sitl:
      velocity_local_ned: true
      takeoff_alt_m: 10.0
    field_orbit:
      trigger_alt_m: 10.0
      alt_tolerance_m: 0.35
      forward_m: 2.0
      radius_m: 5.0
      laps: 5
      direction: clockwise
      orbit_speed_m_s: 0.40
      radial_kp: 0.45
      orbit_entry_radial_kp: 0.75
      orbit_entry_blend_s: 5.0
      altitude_kp: 0.22
      max_vz: 0.15
      geofence_radius_m: 20.0
      max_duration_s: 600
      return_on_timeout: false
      loiter_settle_s: 2.0
      standby_retrigger: true
      pilot:
        guided_mode_channel: null
        kill_switch_rc_channel: 8
        kill_switch_pwm_high: 1300
        companion_land_on_kill: false
    gcs_monitor:
      statustext_interval_s: 2.0
      mp_use_autopilot_sysid: true

  sitl:
    camera:
      source: synthetic
      synthetic_scenario: tests/fixtures/sitl_synthetic_multi.json
      synthetic_depth_m: 3.0
      width: 640
      height: 480
    mavlink:
      connection: "tcp:127.0.0.1:5760"
    spray:
      method: none
    safety:
      geofence_abort: false
      check_battery: false
    sitl:
      wall_standoff_m: 1.2
      backoff_m: 1.5
      search_speed: 0.10
      creep_speed: 0.10
      approach_lane_y: 0.3
      approach_slow_zone_m: 3.0
      min_ground_clearance_m: 1.0
      altitude_kp: 0.22
      max_vz: 0.14
      alt_offset_m: -0.15
      cruise_alt_m: 5.0
      descent_wall_range_m: 5.0
      retreat_alt_m: 5.0
      retreat_home_north_m: 3.0
      complete_hold_s: 5.0
    gimbal:
      enabled: true
      channel: 9
      pwm_min: 1000
      pwm_max: 2000
      pwm_neutral: 1500
      kp: 0.8
      deadband_px: 40
    auto_nav:
      approach_timeout_s: 90
      kp_x: 0.00045
      kp_y: 0.00045
      kd_x: 0.0018
      kd_y: 0.0018
      vel_smooth: 0.55
      max_vel: 0.12
      approach_speed: 0.10
      side_clearance_m: 0.0
    metric_recon:
      mode: depth_at_target
      camera_down: false

  sitl_physics:
    camera:
      source: synthetic_physics
      synthetic_scenario: tests/fixtures/sitl_physics_wall.json
      width: 640
      height: 480
      hfov_deg: 66.0
      vfov_deg: 52.0
    mavlink:
      connection: "tcp:127.0.0.1:5760"
    spray:
      method: none
    safety:
      geofence_abort: false
      check_battery: false
    sitl:
      wall_standoff_m: 1.2
      backoff_m: 1.5
      search_speed: 0.10
      creep_speed: 0.10
      approach_slow_zone_m: 3.0
      approach_lane_y: 0.3
      min_ground_clearance_m: 1.0
      altitude_kp: 0.22
      max_vz: 0.14
      alt_offset_m: -0.15
      cruise_alt_m: 5.0
      descent_wall_range_m: 5.0
      retreat_alt_m: 5.0
      retreat_home_north_m: 3.0
      complete_hold_s: 5.0
    gimbal:
      enabled: true
      channel: 9
      pwm_min: 1000
      pwm_max: 2000
      pwm_neutral: 1500
      kp: 0.35
      deadband_px: 55
      min_interval_s: 0.12
    metric_recon:
      mode: depth_at_target
      camera_down: false
    cv:
      max_frames_without_target: 60
    auto_nav:
      approach_timeout_s: 90
      kp_x: 0.00045
      kp_y: 0.00045
      kd_x: 0.0018
      kd_y: 0.0018
      vel_smooth: 0.55
      max_vel: 0.12
      deadband_px: 55
      approach_speed: 0.10
      side_clearance_m: 0.0

  indoor:
    flight:
      profile: indoor
      require_gps: false
      mode: GUIDED_NOGPS
      arm_check_gps: false
    camera:
      source: rpi_local
    metric_recon:
      mode: depth_at_target
      rangefinder: depth_at_target
      camera_down: false
    safety:
      geofence_abort: false
      check_battery: false
    cv:
      hsv_min_area_px: 450
    auto_nav:
      kp_x: 0.0006
      kp_y: 0.0006
      kd_x: 0.0014
      kd_y: 0.0014
      vel_smooth: 0.42
      deadband_px: 50
      approach_speed: 0.10
      side_clearance_m: 0.8
      lateral_pixel_blend: 0.30

  outdoor:
    flight:
      profile: outdoor
      require_gps: true
      mode: GUIDED
    camera:
      source: rpi_local
    metric_recon:
      mode: depth_at_target
      rangefinder: depth_at_target
      camera_down: false
    cv:
      method: yolo
      hsv_dry: { h_min: 125, h_max: 175, s_min: 40, v_min: 40 }
      hsv_shot: { h_min: 95, h_max: 135, s_min: 40, v_min: 40 }
      hsv_min_area_px: 400
      confidence_threshold: 0.30
    auto_nav:
      kp_x: 0.0005
      kp_y: 0.0005
      kd_x: 0.0018
      kd_y: 0.0018
      vel_smooth: 0.45
      deadband_px: 55
      approach_speed: 0.08
      side_clearance_m: 1.2
      lateral_pixel_blend: 0.25
    safety:
      geofence_abort: true

auto_nav:
  kp_x: 0.0006                           # tuned from SITL - softer lateral gain
  kp_y: 0.0006
  kd_x: 0.0014                           # damping to cut oscillation near target
  kd_y: 0.0014
  vel_smooth: 0.42                       # low-pass on velocity commands
  max_vel: 0.15                          # cap lateral correction (m/s)
  deadband_px: 50
  approach_speed: 0.10                   # forward creep during approach (m/s)
  creep_speed: 0.10                      # minimum forward speed when remediating
  approach_slow_zone_m: 2.5              # taper approach inside this range (m)
  closing_rate_m_s: 0.05                 # brake if closing faster than this
  side_clearance_m: 1.0
  lateral_pixel_blend: 0.3               # pixel PD weight for lateral fine-tune (world-primary motion)
  target_lock_area_px: 15000
  approach_timeout_s: 90
  lock_duration_s: 1.5
  lock_timeout_s: 30

spray:
  method: MAVLINK_SERVO
  channel: 15                           # AUX 7 / SERVO15
  pwm_open: 1900
  pwm_close: 1100
  duration_s: 2.0

safety:
  min_battery_pct: 20
  geofence_abort: true
  mission_timeout_s: 600                # 0 disables global timeout
  rtl_on_abort: false                   # set true to command RTL on battery/geofence abort
