# Vion - fire suppression drone (Pixhawk 6C, GCS offload)
# Edit mavlink.connection for each laptop (check Device Manager for COM port)

drone: vion

mavlink:
  connection: "COM5"                    # CHANGE per laptop; use udpin:127.0.0.1:14550 for SITL
  baud: 57600
  sitl_fallback: "udpin:127.0.0.1:14550"

camera:
  scrcpy_window_title: ExtinguisherCam
  phone_ip: null                        # set for wireless adb, e.g. "192.168.1.100:5555"
  hfov_deg: 66.0
  vfov_deg: 52.0

cv:
  method: hsv                           # hsv | yolo | both
  models:
    dry: models/dry.onnx
    shot: models/shot.onnx
  hsv_dry:  { h_min: 130, h_max: 170, s_min: 50, v_min: 50 }
  hsv_shot: { h_min: 100, h_max: 130, s_min: 50, v_min: 50 }
  hsv_min_area_px: 500                  # ignore small colour blobs
  confidence_threshold: 0.35
  max_frames_without_target: 30

metric_recon:
  rangefinder: fov_estimate              # vl53l1x | fov_estimate | none
  target_diameter_m: 0.30                # competition target size for FOV range
  min_approach_distance_m: 2.0           # CONOPS: must detect from beyond 2m
  fire_distance_m: 0.8                   # switch to aim / allow fire when closer
  wall_offset_m: 0.0
  camera_down: true
  rangefinder_stale_s: 1.0

auto_nav:
  kp_x: 0.002
  kp_y: 0.002
  kd_x: 0.0
  kd_y: 0.0
  max_vel: 0.5
  deadband_px: 40
  approach_speed: 0.3
  side_clearance_m: 1.0
  target_lock_area_px: 15000
  approach_timeout_s: 30
  lock_duration_s: 1.5
  lock_timeout_s: 10

spray:
  method: MAVLINK_SERVO
  channel: 15                           # AUX 7 / SERVO15
  pwm_open: 1900
  pwm_close: 1100
  duration_s: 2.0

safety:
  min_battery_pct: 20
  geofence_abort: true
